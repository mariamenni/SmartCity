# =============================================================================
# docker-compose.kafka.yaml — Overlay J2 : Kafka (Confluent Platform 8.1 KRaft)
#
# Usage :
#   docker compose -f docker-compose.yaml -f docker-compose.kafka.yaml up -d
#
# Services ajoutés :
#   kafka          — Broker Confluent 8.1.2 (mode KRaft, sans Zookeeper)
#   kafka-ui       — UI Kafka provectus (http://localhost:8090)
#   kafka-exporter — Métriques Kafka pour Prometheus (port 9308)
#
# Topics à créer après démarrage :
#   docker compose exec kafka kafka-topics \
#     --bootstrap-server kafka:9092 \
#     --create --topic sensor-measurements --partitions 3 --replication-factor 1
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Kafka Broker — Confluent Platform 8.1.2, mode KRaft (sans Zookeeper)
  #
  # CRITIQUE : KAFKA_ADVERTISED_LISTENERS doit utiliser "kafka" (nom Docker)
  # et NON "localhost" — sinon les consumers dans d'autres conteneurs
  # ne peuvent pas joindre le broker.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:8.1.2
    ports:
      - "9092:9092"
    environment:
      # Mode KRaft (sans Zookeeper)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # Kafka UI — Interface web provectus (http://localhost:8090)
  # Permet de créer des topics, voir les messages, inspecter les consumer groups
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smartcity-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # kafka-exporter — Métriques Kafka pour Prometheus (port 9308)
  # Dashboard Grafana à importer : ID 7589 (Kafka Overview)
  # ---------------------------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # Mise à jour sensor-simulator pour publier aussi sur Kafka (J2)
  # La variable d'env KAFKA_BOOTSTRAP_SERVERS active le mode streaming
  # ---------------------------------------------------------------------------
  sensor-simulator:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC: "sensor-measurements"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:

networks:
  airflow-net:
    driver: bridge
