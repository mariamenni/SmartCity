# =============================================================================
# docker-compose.kafka.yaml — Overlay J2 : Kafka (Confluent Platform 8.1 KRaft)
#
# Usage :
#   docker compose -f docker-compose.yaml \
#                  -f docker-compose.override.yaml \
#                  -f docker-compose.kafka.yaml up -d
#
# Services ajoutes :
#   kafka          — Broker Confluent 8.1.2 (mode KRaft, sans Zookeeper)
#   kafka-ui       — UI Kafka provectus (http://localhost:8090)
#   kafka-exporter — Metriques Kafka pour Prometheus (port 9308)
#
# Topics crees automatiquement (KAFKA_AUTO_CREATE_TOPICS_ENABLE=true) :
#   sensor-measurements  — lectures capteurs productes par le DAG producteur
#
# Pour creer le topic manuellement si besoin :
#   docker compose exec kafka kafka-topics \
#     --bootstrap-server localhost:9092 \
#     --create --topic sensor-measurements --partitions 3 --replication-factor 1
#
# Connexion Airflow a creer (Admin -> Connections) :
#   Conn Id  : kafka_bootstrap
#   Conn Type: Generic
#   Host     : kafka
#   Port     : 9092
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Kafka Broker — Confluent Platform 8.1.2, mode KRaft (sans Zookeeper)
  #
  # CRITIQUE : KAFKA_ADVERTISED_LISTENERS doit utiliser "kafka" (nom Docker)
  # et NON "localhost" — sinon les consumers dans d'autres conteneurs
  # ne peuvent pas joindre le broker.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:8.1.2
    ports:
      - "9092:9092"
    environment:
      # Mode KRaft (sans Zookeeper)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # localhost:9092 car le healthcheck s'execute DANS le conteneur kafka
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: always

  # ---------------------------------------------------------------------------
  # Kafka UI — Interface web provectus (http://localhost:8090)
  # Permet de creer des topics, voir les messages, inspecter les consumer groups
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smartcity-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  # ---------------------------------------------------------------------------
  # kafka-exporter — Metriques Kafka pour Prometheus (port 9308)
  # Dashboard Grafana a importer : ID 7589 (Kafka Overview)
  # ---------------------------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  # ---------------------------------------------------------------------------
  # Injection de la variable KAFKA_BOOTSTRAP_SERVERS dans les services Airflow
  # pour que les DAGs producteur/consommateur puissent joindre le broker.
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  airflow-scheduler:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  airflow-dag-processor:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  airflow-worker:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy

  airflow-triggerer:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

volumes:
  kafka-data:
