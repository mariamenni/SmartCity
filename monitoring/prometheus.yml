# =============================================================================
# prometheus.yml — Configuration Prometheus pour le projet SmartCity
#
# Cibles surveillées :
#   - Prometheus lui-même (auto-scrape)
#   - postgres-exporter    : métriques TimescaleDB
#   - statsd-exporter      : métriques Airflow (tasks, DAGs, scheduler)
#   - kafka-exporter       : métriques Kafka consumer lag (si J2 actif)
#
# Dashboards Grafana à importer (par ID) :
#   11010 — Airflow Cluster
#    9628 — PostgreSQL
#    7589 — Kafka Overview (J2)
#    1860 — Node Exporter Full
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: timescaledb
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]

  # Actif quand docker-compose.kafka.yaml est inclus
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
