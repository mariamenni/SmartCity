# =============================================================================
# dashboards.yaml — Provisioning automatique des dashboards Grafana
# Grafana charge ce fichier au démarrage et importe les JSON du dossier
# =============================================================================

apiVersion: 1

providers:
  - name: SmartCity
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
